<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.0" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- terminal window -->
  <rect x="40" y="40" width="1120" height="550" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="40" width="1120" height="48" fill="#0d0d0d"/>
  <line x1="40" y1="88" x2="1160" y2="88" stroke="#00ff41" stroke-opacity="0.22"/>

  <!-- left accent bar (echoes border-l-2 motif) -->
  <line x1="80" y1="210" x2="80" y2="375" stroke="#00ff41" stroke-opacity="0.40" stroke-width="3"/>

  <!-- window controls + all text: gentle phosphor glow -->
  <g filter="url(#glow)">
    <rect x="64" y="56" width="16" height="16" fill="#00ff41"/>
    <rect x="90" y="56" width="16" height="16" fill="#007a1f"/>
    <rect x="116" y="56" width="16" height="16" fill="#005c17"/>

    <text x="152" y="71" font-size="20" fill="#00aa2a">gautier@playbook:~$<tspan fill="#005c17"> — portfolio</tspan></text>
    <text x="1136" y="71" font-size="16" fill="#005c17" text-anchor="end">self-hosted</text>

    <text x="80" y="175" font-size="28" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> whoami</text>

    <text x="104" y="300" font-size="88" font-weight="700" fill="#00ff41">Gautier Chuinard</text>
    <text x="104" y="360" font-size="30" fill="#00aa2a">Product Owner · QA · Bordeaux, FR</text>

    <text x="80" y="440" font-size="24" fill="#005c17">// projets auto-hébergés, terminal phosphore, FR/EN</text>
    <text x="80" y="492" font-size="26" fill="#007a1f">gautierchuinard.com</text>

    <text x="80" y="554" font-size="30" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <!-- CRT overlays -->
  <rect width="1200" height="630" fill="url(#scan)"/>
  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
