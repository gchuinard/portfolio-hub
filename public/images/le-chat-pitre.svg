<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <!-- booking badge (crisp) + divider -->
  <rect x="566" y="120" width="170" height="24" fill="#003b0f" stroke="#00ff41" stroke-opacity="0.5"/>
  <line x1="64" y1="238" x2="736" y2="238" stroke="#00ff41" stroke-opacity="0.18"/>

  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">le-chat-pitre<tspan fill="#005c17"> — ~/pension</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">homelab</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> pension --sejours</text>

    <text x="64" y="148" font-size="16" fill="#00ff41">=^..^=  <tspan fill="#00aa2a">Mochi</tspan> <tspan fill="#005c17">· chat européen, 2 ans</tspan></text>
    <text x="651" y="137" font-size="12.5" fill="#00ff41" text-anchor="middle">[ réservé ]</text>
    <text x="84" y="182" font-size="13.5" fill="#00aa2a">séjour · 2026-07-01 → 07-08 <tspan fill="#005c17">· 7 nuits</tspan></text>
    <text x="84" y="210" font-size="13.5" fill="#00aa2a">carnet de séjour · 5 photos <tspan fill="#005c17">· messagerie</tspan></text>

    <g font-size="13.5" xml:space="preserve">
      <text x="84" y="272" fill="#005c17"><tspan fill="#00ff41">●</tspan> visio 1:1  <tspan fill="#00aa2a">WebRTC pair-à-pair · TURN Cloudflare</tspan></text>
      <text x="84" y="302" fill="#005c17"><tspan fill="#007a1f">▣</tspan> facture    <tspan fill="#00aa2a">PDF · 168 €</tspan> <tspan fill="#005c17">(nuits + suppléments)</tspan></text>
      <text x="84" y="332" fill="#005c17"><tspan fill="#00ff41">✓</tspan> avis maison <tspan fill="#00aa2a">validé</tspan></text>
    </g>

    <text x="64" y="366" font-size="13" fill="#005c17">// auth maison · documents santé · design mid-century</text>
    <text x="64" y="394" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
