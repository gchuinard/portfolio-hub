<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <!-- jauge bar (crisp) -->
  <rect x="150" y="160" width="430" height="14" fill="#080808" stroke="#00ff41" stroke-opacity="0.25"/>
  <rect x="152" y="162" width="349" height="10" fill="#00ff41" fill-opacity="0.55"/>
  <!-- ticket / QR panel (crisp) -->
  <rect x="568" y="196" width="168" height="150" fill="#080808" stroke="#00ff41" stroke-opacity="0.30"/>
  <!-- QR finder squares -->
  <rect x="588" y="216" width="26" height="26" fill="none" stroke="#00ff41" stroke-opacity="0.85"/>
  <rect x="595" y="223" width="12" height="12" fill="#00ff41"/>
  <rect x="690" y="216" width="26" height="26" fill="none" stroke="#00ff41" stroke-opacity="0.85"/>
  <rect x="697" y="223" width="12" height="12" fill="#00ff41"/>
  <rect x="588" y="288" width="26" height="26" fill="none" stroke="#00ff41" stroke-opacity="0.85"/>
  <rect x="595" y="295" width="12" height="12" fill="#00ff41"/>
  <!-- QR scatter modules -->
  <rect x="636" y="222" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="654" y="236" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="636" y="252" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="668" y="258" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="650" y="272" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="684" y="282" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>
  <rect x="636" y="296" width="8" height="8" fill="#00ff41" fill-opacity="0.8"/>

  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">billetterie<tspan fill="#005c17"> — ~/desha-moulin</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">wip</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> billetterie --demandes</text>

    <text x="64" y="144" font-size="12.5" fill="#007a1f">salle Bergerac · 754 places · éventail A→Y</text>

    <text x="64" y="172" font-size="13" fill="#007a1f">jauge</text>
    <text x="588" y="148" font-size="12" fill="#005c17">billet</text>
    <text x="510" y="172" font-size="12" fill="#00aa2a">612 / 754</text>

    <g font-size="13.5" xml:space="preserve">
      <text x="64" y="216" fill="#005c17"><tspan fill="#00ff41">●</tspan> #142 Durand  <tspan fill="#00aa2a">4 pl.</tspan> <tspan fill="#007a1f">placées</tspan> <tspan fill="#00ff41">soldé</tspan></text>
      <text x="64" y="246" fill="#005c17"><tspan fill="#ffaa00">◐</tspan> #143 Petit   <tspan fill="#00aa2a">2 pl.</tspan> <tspan fill="#007a1f">à placer</tspan> <tspan fill="#ffaa00">acompte</tspan></text>
      <text x="64" y="276" fill="#005c17"><tspan fill="#007a1f">○</tspan> #144 Maros   <tspan fill="#00aa2a">6 pl.</tspan> <tspan fill="#007a1f">placées</tspan> <tspan fill="#005c17">non réglé</tspan></text>
    </g>

    <text x="652" y="334" font-size="11" fill="#007a1f" text-anchor="middle">scan à l'entrée</text>

    <text x="64" y="320" font-size="13" fill="#005c17">// placement manuel assisté (≤3 suggestions, humain valide)</text>
    <text x="64" y="350" font-size="13" fill="#005c17">// pas de paiement en ligne · versements espèces/chèques</text>
    <text x="64" y="392" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
