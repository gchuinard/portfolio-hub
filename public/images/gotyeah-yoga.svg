<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>

  <!-- terminal window -->
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <!-- booking-flow boxes + capacity badges (no glow, crisp borders) -->
  <rect x="64"  y="130" width="104" height="32" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>
  <rect x="200" y="130" width="92"  height="32" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>
  <rect x="324" y="130" width="128" height="32" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>
  <rect x="484" y="130" width="84"  height="32" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>
  <rect x="384" y="243" width="76"  height="16" fill="#080808" stroke="#00ff41" stroke-opacity="0.25"/>
  <rect x="384" y="271" width="76"  height="16" fill="#080808" stroke="#00ff41" stroke-opacity="0.25"/>
  <rect x="384" y="299" width="76"  height="16" fill="#080808" stroke="#ffaa00" stroke-opacity="0.40"/>

  <!-- window controls + all text: gentle phosphor glow -->
  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">gotyeah-yoga<tspan fill="#005c17"> — ~/studio</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">live</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> booking --flow --today</text>

    <!-- pipeline labels + arrows -->
    <g font-size="13" fill="#00aa2a" text-anchor="middle">
      <text x="116" y="150">formule</text>
      <text x="246" y="150">crédits</text>
      <text x="388" y="150">réservation</text>
      <text x="526" y="150">cours</text>
    </g>
    <g font-size="12" fill="#007a1f" text-anchor="middle">
      <text x="184" y="149">▶</text>
      <text x="308" y="149">▶</text>
      <text x="468" y="149">▶</text>
    </g>
    <text x="238" y="190" font-size="12" fill="#007a1f">▴ crédits FIFO · annulation -6h</text>

    <!-- planning -->
    <text x="64" y="228" font-size="14.5" fill="#00aa2a"><tspan fill="#007a1f">▾</tspan> planning · <tspan fill="#005c17">aujourd'hui</tspan></text>
    <g font-size="14.5" xml:space="preserve">
      <text x="64" y="256" fill="#005c17">├─ <tspan fill="#007a1f">•</tspan> <tspan fill="#00aa2a">12:30  Yin Yoga</tspan></text>
      <text x="64" y="284" fill="#005c17">├─ <tspan fill="#007a1f">•</tspan> <tspan fill="#00aa2a">18:30  Vinyasa Flow</tspan></text>
      <text x="64" y="312" fill="#005c17">└─ <tspan fill="#00ff41">▪</tspan> <tspan fill="#00aa2a">10:00  Atelier Pranayama</tspan></text>
    </g>
    <text x="422" y="255" font-size="11" fill="#007a1f" text-anchor="middle">11/12</text>
    <text x="422" y="283" font-size="11" fill="#007a1f" text-anchor="middle">8/12</text>
    <text x="422" y="311" font-size="11" fill="#ffaa00" text-anchor="middle">complet</text>

    <text x="64" y="352" font-size="13" fill="#005c17">// Stripe Checkout · espace yogi · invités · RGPD</text>

    <text x="64" y="384" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <!-- CRT overlays -->
  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
