<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <rect x="64" y="134" width="452" height="152" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>

  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">gotyeah-monitor<tspan fill="#005c17"> — ~/monitor</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">live</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> monitor --status</text>

    <text x="84" y="160" font-size="12.5" fill="#007a1f">6 services · check toutes les 10 min</text>
    <g font-size="13.5">
      <text x="84" y="192" fill="#00ff41">●</text>
      <text x="84" y="220" fill="#00ff41">●</text>
      <text x="84" y="248" fill="#00ff41">●</text>
      <text x="84" y="276" fill="#ff3030">○</text>
    </g>
    <g font-size="13.5" fill="#00aa2a">
      <text x="106" y="192">gautierchuinard.com</text>
      <text x="106" y="220">monitor.gotyeah.dev</text>
      <text x="106" y="248">blog.gotyeah.dev</text>
      <text x="106" y="276" fill="#007a1f">legacy.intra</text>
    </g>
    <g font-size="13.5" fill="#007a1f">
      <text x="372" y="192">200</text>
      <text x="372" y="220">200</text>
      <text x="372" y="248">200</text>
      <text x="372" y="276">---</text>
    </g>
    <g font-size="13.5" fill="#007a1f">
      <text x="436" y="192">84 ms</text>
      <text x="436" y="220">61 ms</text>
      <text x="436" y="248">132 ms</text>
      <text x="436" y="276" fill="#ff3030">down</text>
    </g>

    <text x="64" y="324" font-size="13" fill="#005c17"><tspan fill="#ffaa00">▴</tspan> SSL · certificat expire dans 48 j · auth maison (JWT)</text>

    <text x="64" y="358" font-size="13" fill="#005c17">// FastAPI ▸ worker checks ▸ SvelteKit ▸ historique 7 j</text>
    <text x="64" y="388" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
