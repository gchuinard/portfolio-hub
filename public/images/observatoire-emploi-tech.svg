<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <rect x="64" y="158" width="448" height="142" fill="#080808" stroke="#00ff41" stroke-opacity="0.28"/>

  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">tech-jobs<tspan fill="#005c17"> — ~/jobs</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">veille</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> jobs --scan --region FR</text>

    <text x="64" y="140" font-size="14" fill="#00aa2a">offres analysées <tspan fill="#00ff41">12 480</tspan></text>

    <text x="84" y="184" font-size="12.5" fill="#007a1f">compétences les plus demandées</text>
    <g font-size="14" fill="#00aa2a">
      <text x="84" y="216">React</text>
      <text x="84" y="244">Python</text>
      <text x="84" y="272">TypeScript</text>
    </g>
    <g font-size="14">
      <text x="216" y="216"><tspan fill="#00aa2a">█████</tspan><tspan fill="#005c17">░░░░░░░</tspan></text>
      <text x="216" y="244"><tspan fill="#00aa2a">████</tspan><tspan fill="#005c17">░░░░░░░░</tspan></text>
      <text x="216" y="272"><tspan fill="#00aa2a">███</tspan><tspan fill="#005c17">░░░░░░░░░</tspan></text>
    </g>
    <g font-size="14" fill="#007a1f" text-anchor="end">
      <text x="476" y="216">38%</text>
      <text x="476" y="244">31%</text>
      <text x="476" y="272">24%</text>
    </g>

    <text x="64" y="334" font-size="14" fill="#00aa2a">salaire médian <tspan fill="#00ff41">48 k€</tspan><tspan fill="#005c17">  ·  </tspan><tspan fill="#ffaa00">▴</tspan><tspan fill="#00aa2a"> +6% / trimestre</tspan></text>

    <text x="64" y="364" font-size="13" fill="#005c17">// scraping WTTJ + API France Travail ▸ NLP spaCy</text>
    <text x="64" y="392" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
