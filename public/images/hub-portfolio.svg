<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">portfolio-hub<tspan fill="#005c17"> — ~/</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">[FR] EN</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> ls -la ~/portfolio</text>

    <g font-size="14" xml:space="preserve">
      <text x="64" y="150" fill="#007a1f">drwx  <tspan fill="#00ff41">projects/</tspan>        <tspan fill="#005c17">18 fiches</tspan></text>
      <text x="64" y="178" fill="#007a1f">drwx  <tspan fill="#00aa2a">experience/</tspan>      <tspan fill="#005c17">3 postes</tspan></text>
      <text x="64" y="206" fill="#007a1f">drwx  <tspan fill="#00aa2a">skills/</tspan></text>
      <text x="64" y="234" fill="#007a1f">drwx  <tspan fill="#00aa2a">certifications/</tspan>  <tspan fill="#005c17">12 certs</tspan></text>
      <text x="64" y="262" fill="#007a1f">-rw-  <tspan fill="#00aa2a">README.md</tspan></text>
    </g>

    <text x="64" y="308" font-size="14" fill="#005c17">thème ▸ <tspan fill="#00aa2a">phosphor</tspan>      i18n ▸ <tspan fill="#00aa2a">FR · EN</tspan></text>

    <text x="64" y="358" font-size="13" fill="#005c17">// Astro ▸ content collections ▸ i18n client-side</text>
    <text x="64" y="388" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
