<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Space Mono', ui-monospace, Consolas, 'DejaVu Sans Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.20"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <style>
      .cur { animation: blink 1.1s steps(1, end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0a0a0a"/>

  <!-- terminal window -->
  <rect x="40" y="34" width="720" height="382" fill="#0b0b0b" stroke="#00ff41" stroke-opacity="0.22"/>
  <rect x="40" y="34" width="720" height="34" fill="#0d0d0d"/>
  <line x1="40" y1="68" x2="760" y2="68" stroke="#00ff41" stroke-opacity="0.22"/>

  <!-- view badges (no glow, crisp borders) -->
  <rect x="214" y="238" width="78" height="17" fill="#080808" stroke="#00ff41" stroke-opacity="0.25"/>
  <rect x="214" y="316" width="78" height="17" fill="#080808" stroke="#00ff41" stroke-opacity="0.25"/>

  <!-- window controls + all text: gentle phosphor glow -->
  <g filter="url(#glow)">
    <rect x="58" y="46" width="10" height="10" fill="#00ff41"/>
    <rect x="76" y="46" width="10" height="10" fill="#007a1f"/>
    <rect x="94" y="46" width="10" height="10" fill="#005c17"/>

    <text x="124" y="56" font-size="13" fill="#00aa2a">gotyeah-notes<tspan fill="#005c17"> — ~/workspace</tspan></text>
    <text x="744" y="56" font-size="11.5" fill="#005c17" text-anchor="end">self-hosted</text>

    <text x="64" y="106" font-size="14.5" fill="#00ff41"><tspan fill="#00aa2a">$</tspan> tree ~/workspace --views</text>

    <text x="64" y="144" font-size="14.5" fill="#00ff41">workspace/</text>

    <g font-size="14.5" xml:space="preserve">
      <text x="64" y="170" fill="#005c17">├─ <tspan fill="#007a1f">•</tspan> <tspan fill="#00aa2a">Getting Started</tspan></text>
      <text x="64" y="196" fill="#005c17">├─ <tspan fill="#007a1f">▾</tspan> <tspan fill="#00aa2a">Projects/</tspan></text>
      <text x="64" y="222" fill="#005c17">│  ├─ <tspan fill="#007a1f">•</tspan> <tspan fill="#00aa2a">Roadmap</tspan></text>
      <text x="64" y="248" fill="#005c17">│  └─ <tspan fill="#00ff41">▪</tspan> <tspan fill="#00aa2a">Tasks</tspan></text>
      <text x="64" y="274" fill="#005c17">├─ <tspan fill="#007a1f">▾</tspan> <tspan fill="#00aa2a">Notes/</tspan></text>
      <text x="64" y="300" fill="#005c17">│  └─ <tspan fill="#007a1f">•</tspan> <tspan fill="#00aa2a">Daily Log</tspan></text>
      <text x="64" y="326" fill="#005c17">└─ <tspan fill="#00ff41">▪</tspan> <tspan fill="#00aa2a">CRM</tspan></text>
    </g>

    <text x="253" y="250" font-size="11" fill="#007a1f" text-anchor="middle">kanban</text>
    <text x="253" y="328" font-size="11" fill="#007a1f" text-anchor="middle">table</text>

    <text x="64" y="364" font-size="13" fill="#005c17">// blocks · drag &amp; drop · table/kanban/calendar/gallery</text>

    <text x="64" y="392" font-size="14.5" fill="#00aa2a">$ <tspan class="cur" fill="#00ff41">▮</tspan></text>
  </g>

  <!-- CRT overlays -->
  <rect width="800" height="450" fill="url(#scan)"/>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
