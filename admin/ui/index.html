<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>admin · Hub Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="dot"></span>
      <h1>GOT_YEAH // admin</h1>
      <span class="prompt">$ ./manage-content --local</span>
      <span class="spacer"></span>
      <button class="btn topbtn" id="devBtn" title="Lancer le serveur d'aperçu (npm run dev)">▶ aperçu</button>
      <button class="btn topbtn primary" id="publishBtn" title="Commit + push → met à jour la prod">⬆ publier</button>
    </header>

    <div class="layout">
      <aside>
        <div class="tabs" id="tabs" role="tablist"></div>
        <div class="list-toolbar">
          <input id="search" type="text" placeholder="grep…" aria-label="Filtrer" autocomplete="off" />
          <button class="btn primary" id="newBtn" title="Nouvelle entrée">[ + ]</button>
        </div>
        <ul class="entries" id="entries"></ul>
      </aside>

      <main id="editor">
        <p class="editor-empty">
          <span class="prompt">$</span> sélectionne une entrée à gauche, ou <strong>[ + ]</strong> pour en créer une.
        </p>
      </main>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <div id="modal" role="dialog" aria-modal="true">
      <div class="box">
        <h3 id="modalTitle">Confirmer</h3>
        <p id="modalMsg"></p>
        <div class="modal-actions">
          <button class="btn" id="modalCancel">Annuler</button>
          <button class="btn danger" id="modalConfirm">Confirmer</button>
        </div>
      </div>
    </div>

    <div id="publishModal" role="dialog" aria-modal="true">
      <div class="box pm-box">
        <h3>⬆ Publier (commit + push)</h3>
        <p class="pm-intro">
          <span class="prompt">#</span> Ces modifications partiront sur <code id="pmBranch">main</code> →
          le site public se met à jour <strong>automatiquement</strong> (~30 s).
        </p>
        <div class="pm-section">
          <label class="pm-label">modifications en attente</label>
          <div id="pmPending" class="pm-pending"></div>
        </div>
        <div class="pm-section">
          <label class="pm-label" for="pmMessage">message de commit</label>
          <input id="pmMessage" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <pre id="pmOutput" class="pm-output" hidden></pre>
        <div class="modal-actions">
          <button class="btn" id="pmCancel">Fermer</button>
          <button class="btn primary" id="pmConfirm">Publier</button>
        </div>
      </div>
    </div>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
