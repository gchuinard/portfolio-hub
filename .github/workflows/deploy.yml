name: Deploy Gautier Playbooks

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p "$RUNNER_TEMP/.ssh"
          KEY="$RUNNER_TEMP/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > "$KEY"
          chmod 600 "$KEY"
          if ! ssh-keygen -y -f "$KEY" < /dev/null > /dev/null 2>&1; then
            echo "::error::DEPLOY_KEY n'est pas une cle privee valide une fois ecrite dans le runner."
            echo "Diagnostic : $(wc -l < "$KEY") lignes, $(wc -c < "$KEY") octets"
            grep -q "BEGIN.*PRIVATE KEY" "$KEY" && echo "marqueur BEGIN : present" || echo "marqueur BEGIN : ABSENT"
            grep -q "END.*PRIVATE KEY" "$KEY" && echo "marqueur END : present" || echo "marqueur END : ABSENT"
            exit 1
          fi
          echo "Cle SSH valide ($(wc -l < "$KEY") lignes)."
          ssh-keyscan -H "$DEPLOY_HOST" > "$RUNNER_TEMP/.ssh/known_hosts" 2>/dev/null

      - name: Deploy via rsync
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i $RUNNER_TEMP/.ssh/deploy_key -o UserKnownHostsFile=$RUNNER_TEMP/.ssh/known_hosts" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"

      - name: Cleanup SSH key
        if: always()
        run: rm -rf "$RUNNER_TEMP/.ssh"

