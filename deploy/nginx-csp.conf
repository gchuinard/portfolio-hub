# ─────────────────────────────────────────────────────────────────────────────
# CSP de gautierchuinard.com — TEMPLATE (le marqueur dans script-src est remplacé au build).
#
# ⚠️  Ce fichier est un MODÈLE. La version réellement servie est
#     `deploy/nginx-csp.conf.final`, générée AU BUILD par `inject-csp-hashes.mjs`
#     (`npm run build`), qui remplace le marqueur de script-src par les hashes SHA-256
#     des scripts inline du build courant → header et HTML toujours synchro.
#
# Pourquoi des hashes et pas 'unsafe-inline' : le site Astro a 2 scripts `is:inline`
# obligatoires (thème anti-flash + dico i18n, doivent tourner avant le 1er rendu) et
# plusieurs `<script>` bundlés qu'Astro inline. 'unsafe-inline' annulerait tout le
# bénéfice de la CSP (et la note Sonar). Les hashes autorisent EXACTEMENT ces scripts.
#
# Mise en place côté Nginx Proxy Manager (DÉJÀ FAIT en prod) :
#   host gautierchuinard.com (proxy_host id 7) → Custom location « / » → Advanced :
#   la ligne `add_header Content-Security-Policy ...` a été remplacée par
#         include /data/nginx/custom/gautier-csp.conf;
#   (persisté dans la base NPM → survit aux régénérations). La CI écrit ce fichier
#   dans le conteneur NPM (`docker exec -i npm`) et fait `nginx -s reload` à chaque
#   deploy → CSP toujours synchro avec le build. Voir .github/workflows/deploy.yml.
#
# CSP :
#   - script-src : 'self' + hashes injectés au build (les scripts inline d'Astro)
#   - style-src garde 'unsafe-inline' (styles inline Astro/Tailwind, non hashables)
#   - font-src 'self' : police Space Mono self-hostée (plus de fonts.gstatic.com)
#   - plus aucun domaine Google (fonts self-hostées) → corrige aussi le SRI manquant
#   - form-action 'self' (durcissement sans risque : site statique sans form externe)
# ─────────────────────────────────────────────────────────────────────────────
add_header Content-Security-Policy "default-src 'self'; script-src 'self' __CSP_SCRIPT_HASHES__; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
